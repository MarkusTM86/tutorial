<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Finch-robot gör en 180-graders sväng</title>
  <desc id="desc">En enkel animation där en robot roterar 180 grader åt höger och lämnar ett halvcirkelformat spår.</desc>

  <style>
    .label { font-family: Arial, sans-serif; font-size: 24px; fill: #222; }
    .small { font-family: Arial, sans-serif; font-size: 18px; fill: #333; }
    .track { fill: none; stroke: #555; stroke-width: 6; stroke-linecap: round; stroke-dasharray: 440; stroke-dashoffset: 440; }
    .arrow { fill: none; stroke: #222; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
    .robot-body { fill: #f5f5f5; stroke: #222; stroke-width: 4; }
    .wing { fill: #d9ecff; stroke: #222; stroke-width: 3; }
    .wheel { fill: #222; }
    .beak { fill: #ffcc4d; stroke: #222; stroke-width: 3; }
    .led { fill: #68d391; stroke: #222; stroke-width: 2; }

    #pathTrace {
      animation: drawPath 3s ease-in-out infinite;
    }

    #robot {
      transform-origin: 400px 250px;
      animation: turnRobot 3s ease-in-out infinite;
    }

    @keyframes drawPath {
      0% { stroke-dashoffset: 440; opacity: 1; }
      55% { stroke-dashoffset: 0; opacity: 1; }
      85% { stroke-dashoffset: 0; opacity: 1; }
      100% { stroke-dashoffset: 440; opacity: 0.25; }
    }

    @keyframes turnRobot {
      0% { transform: rotate(0deg); }
      55% { transform: rotate(180deg); }
      85% { transform: rotate(180deg); }
      100% { transform: rotate(360deg); }
    }
  </style>

  <rect width="800" height="500" fill="white"/>

  <text x="400" y="52" text-anchor="middle" class="label">Finch gör en 180°-sväng</text>
  <text x="400" y="88" text-anchor="middle" class="small">Robotens nos pekar först uppåt och svänger sedan åt höger</text>

  <!-- Bakgrundscirkel som stödlinje -->
  <circle cx="400" cy="250" r="135" fill="none" stroke="#ddd" stroke-width="3" stroke-dasharray="8 10"/>

  <!-- Halvcirkelformat spår -->
  <path id="pathTrace" class="track" d="M 400 115 A 135 135 0 0 1 400 385"/>

  <!-- Pilhuvud vid riktningen -->
  <path class="arrow" d="M 444 350 L 400 385 L 356 350"/>

  <!-- Robot, ritad med nosen uppåt från start -->
  <g id="robot">
    <ellipse class="robot-body" cx="400" cy="250" rx="62" ry="86"/>
    <path class="wing" d="M 350 235 C 310 245 307 292 353 300 C 340 275 340 255 350 235 Z"/>
    <path class="wing" d="M 450 235 C 490 245 493 292 447 300 C 460 275 460 255 450 235 Z"/>
    <path class="beak" d="M 400 145 L 378 184 L 422 184 Z"/>
    <circle class="led" cx="377" cy="220" r="10"/>
    <circle class="led" cx="423" cy="220" r="10"/>
    <rect class="wheel" x="342" y="288" width="20" height="52" rx="8"/>
    <rect class="wheel" x="438" y="288" width="20" height="52" rx="8"/>
    <circle cx="382" cy="180" r="5" fill="#222"/>
    <circle cx="418" cy="180" r="5" fill="#222"/>
  </g>

  <text x="400" y="455" text-anchor="middle" class="small">180° rotation på plats</text>
</svg>
